{% extends "base.html" %}

{% block title %}404 - Node Not Found{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20">
    <div class="container mx-auto px-6 text-center">
        <h1 class="text-9xl font-bold mb-4 neon-text glitch" data-text="404">404</h1>
        <h2 class="text-3xl md:text-5xl font-mono text-gray-300 mb-8 border-b border-green-500 inline-block pb-2">
            CRITICAL: NODE NOT FOUND</h2>

        <p class="text-xl text-gray-400 mb-12 max-w-2xl mx-auto font-mono">
            >> Connection failed.<br>
            >> The requested neural pathway does not exist or has been relocated to a secure sector.
        </p>

        <a href="{{ url_for('public.index') }}"
            class="inline-block px-12 py-4 border-2 border-green-500 text-green-500 font-bold text-lg hover:bg-green-500 hover:text-black transition uppercase tracking-widest shadow-[0_0_15px_rgba(0,255,0,0.3)]">
            <i class="fas fa-undo-alt mr-2"></i> Return to Mainframe
        </a>
    </div>
</section>
{% endblock %}
