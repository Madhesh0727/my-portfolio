services:
  - type: web
    name: madhesh-portfolio
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
    
    # Auto-deployment will trigger when you push to your connected repo
    autoDeploy: true

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
    plan: free
